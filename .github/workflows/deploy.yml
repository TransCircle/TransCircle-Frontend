name: Deploy Frontend + Backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/transcircle-backend

jobs:
  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=transcircle-submit --branch=${{ github.ref_name }}

  backend:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build backend
        working-directory: ./functions
        run: |
          pnpm install
          pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./functions
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  db-migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run database setup
        working-directory: ./functions
        env:
          DB_CONFIG__DB_HOSTNAME: ${{ secrets.DB_HOST }}
          DB_CONFIG__DB_PORT: ${{ secrets.DB_PORT || '3306' }}
          DB_CONFIG__DB_USERNAME: ${{ secrets.DB_USER }}
          DB_CONFIG__DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONFIG__DB_DATABASE: ${{ secrets.DB_NAME || 'transcircle' }}
        run: |
          pnpm install
          pnpm run db:setup
