<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransCircleProject</title>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('transcircle-theme')
          // Validate theme value — prevent invalid localStorage values from
          // causing CSS to fail (M1). Valid themes: light, dark, contrast.
          if (t !== 'light' && t !== 'dark' && t !== 'contrast') {
            t = null
          }
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          document.documentElement.setAttribute('data-theme', t)
        } catch(e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
